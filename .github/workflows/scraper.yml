name: Scrape & Send Newsletter
on:
  schedule:
    # 08:00 IST is 02:30 UTC. Run Sun & Wed.
    - cron: '30 2 * * 0,3'
  workflow_dispatch: # Allows manual triggering from the GitHub interface

jobs:
  scrape_and_newsletter:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright anthropic openai markdown pypdf requests
          playwright install chromium

      - name: Run Scraper
        id: scrape_job
        env:
          GITHUB_ACTIONS: "true"
          X_STATE_JSON: ${{ secrets.X_COOKIES_JSON }}
        run: |
          python scraper.py
          
      - name: Alert Failure
        if: failure() && steps.scrape_job.outcome == 'failure'
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: python alert_failure.py

      - name: Run Newsletter Generator
        if: success()
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: |
          python newsletter.py

      - name: Commit State
        if: always()
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add brain.json || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: persist memory brain [skip ci]" && git push)
